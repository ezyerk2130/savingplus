version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: savingplus
      POSTGRES_PASSWORD: savingplus_secret
      POSTGRES_DB: savingplus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savingplus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ENV=development
      - SERVER_PORT=8080
      - ADMIN_SERVER_PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=savingplus
      - DB_PASSWORD=savingplus_secret
      - DB_NAME=savingplus
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=dev-secret-change-in-production-minimum-32-chars-long
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - PAYMENT_GATEWAY=mock
      - RATE_LIMIT_PER_SECOND=30
      - RATE_LIMIT_PER_MINUTE=300
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  customer-app:
    build:
      context: ./frontend/customer-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  admin-app:
    build:
      context: ./frontend/admin-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8081/api/v1/admin
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
