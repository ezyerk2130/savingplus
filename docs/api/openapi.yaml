openapi: 3.0.3
info:
  title: SavingPlus API
  description: |
    Bank-grade savings and investment platform API for Tanzania.
    All monetary amounts are in TZS (Tanzanian Shilling).
  version: 1.0.0
  contact:
    name: SavingPlus Engineering
    email: dev@savingplus.co.tz

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://api.savingplus.co.tz/api/v1
    description: Production

tags:
  - name: Auth
    description: Authentication and authorization
  - name: Profile
    description: User profile management
  - name: Wallet
    description: Wallet operations (deposit, withdraw, balance)
  - name: Transactions
    description: Transaction history
  - name: Savings
    description: Savings plans
  - name: KYC
    description: Know Your Customer verification
  - name: Notifications
    description: User notifications

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, full_name, password, pin]
              properties:
                phone: { type: string, example: "+255712345678" }
                full_name: { type: string, example: "John Doe" }
                password: { type: string, minLength: 8 }
                pin: { type: string, pattern: "^\\d{4}$" }
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  user_id: { type: string, format: uuid }
        '409':
          description: Phone number already registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with phone and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, password]
              properties:
                phone: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'

  /auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone: { type: string }
                code: { type: string, pattern: "^\\d{6}$" }
      responses:
        '200':
          description: OTP verified

  /wallet/balance:
    get:
      tags: [Wallet]
      summary: Get wallet balance
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalance'

  /wallet/deposit:
    post:
      tags: [Wallet]
      summary: Initiate mobile money deposit
      security: [{ bearerAuth: [] }]
      parameters:
        - name: Idempotency-Key
          in: header
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, payment_method, phone_number, idempotency_key]
              properties:
                amount: { type: number, minimum: 1000 }
                payment_method: { type: string, enum: [mpesa, tigopesa, airtel, halopesa] }
                phone_number: { type: string }
                idempotency_key: { type: string, minLength: 16 }
      responses:
        '202':
          description: Deposit initiated

  /wallet/withdraw:
    post:
      tags: [Wallet]
      summary: Initiate withdrawal to mobile money
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, pin, payment_method, phone_number, idempotency_key]
              properties:
                amount: { type: number, minimum: 1000 }
                pin: { type: string, pattern: "^\\d{4}$" }
                payment_method: { type: string, enum: [mpesa, tigopesa, airtel, halopesa] }
                phone_number: { type: string }
                idempotency_key: { type: string }
                otp_code: { type: string, description: "Required for amounts > TZS 100,000" }
      responses:
        '202':
          description: Withdrawal initiated
        '403':
          description: Step-up auth required or KYC insufficient

  /transactions:
    get:
      tags: [Transactions]
      summary: List user transactions
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: type
          in: query
          schema: { type: string, enum: [deposit, withdrawal, savings_lock, savings_unlock, fee, interest] }
        - name: status
          in: query
          schema: { type: string, enum: [pending, processing, completed, failed, reversed] }
      responses:
        '200':
          description: Paginated transaction list

  /savings/plan:
    post:
      tags: [Savings]
      summary: Create a new savings plan
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string }
                type: { type: string, enum: [flexible, locked, target] }
                target_amount: { type: number }
                lock_duration_days: { type: integer, minimum: 30 }
                auto_debit: { type: boolean }
                auto_debit_amount: { type: number }
                auto_debit_frequency: { type: string, enum: [daily, weekly, monthly] }
      responses:
        '201':
          description: Plan created

  /savings/plans:
    get:
      tags: [Savings]
      summary: List user savings plans
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of savings plans

  /kyc/upload:
    post:
      tags: [KYC]
      summary: Upload KYC document
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document_type: { type: string, enum: [national_id, passport, driving_license, voter_id, selfie, proof_of_address] }
                file: { type: string, format: binary }
      responses:
        '201':
          description: Document uploaded

  /kyc/status:
    get:
      tags: [KYC]
      summary: Get KYC verification status
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: KYC status and documents

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Notifications list with unread count

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TokenPair:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer, description: "Seconds until access token expires" }
        token_type: { type: string, example: "Bearer" }

    WalletBalance:
      type: object
      properties:
        wallet_id: { type: string, format: uuid }
        currency: { type: string, example: "TZS" }
        available_balance: { type: string, example: "150000.00" }
        locked_balance: { type: string, example: "50000.00" }
        total_balance: { type: string, example: "200000.00" }
